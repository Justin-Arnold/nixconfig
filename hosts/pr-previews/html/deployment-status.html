<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Deployment</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #171717;
            color: #e6e6e6;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            padding: 20px;
        }

        .shell {
            max-width: 1180px;
            margin: 0 auto;
        }

        .header {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: start;
            padding: 18px 0;
            border-bottom: 1px solid #3b3b3b;
        }

        h1 {
            font-size: 22px;
            line-height: 1.25;
            font-weight: 700;
        }

        .meta {
            margin-top: 8px;
            color: #a5a5a5;
            font-size: 13px;
            line-height: 1.5;
        }

        .badge {
            min-width: 110px;
            padding: 8px 10px;
            border: 1px solid #4a4a4a;
            border-radius: 6px;
            text-align: center;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0;
            color: #d7d7d7;
            background: #242424;
        }

        .badge.ready {
            border-color: #348b5b;
            color: #9fe3bc;
        }

        .badge.failed {
            border-color: #b84a43;
            color: #ffb1aa;
        }

        .notice {
            display: none;
            margin: 18px 0;
            padding: 14px 16px;
            border: 1px solid #4a4a4a;
            border-radius: 6px;
            background: #222;
            line-height: 1.45;
        }

        .notice.show {
            display: block;
        }

        .notice.ready {
            border-color: #348b5b;
            color: #c9f0d8;
        }

        .notice.failed {
            border-color: #b84a43;
            color: #ffd2ce;
        }

        .terminal {
            height: calc(100vh - 180px);
            min-height: 360px;
            overflow-y: auto;
            margin-top: 18px;
            padding: 16px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #0f0f0f;
            font-size: 13px;
            line-height: 1.55;
        }

        .line {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .line.deploy {
            color: #d7d7d7;
        }

        .line.app {
            color: #9fbbe3;
        }

        .line.error {
            color: #ff9f97;
        }

        .line.state {
            color: #9fe3bc;
        }
    </style>
</head>
<body>
    <main class="shell">
        <header class="header">
            <div>
                <h1 id="title">Preview deployment</h1>
                <div class="meta" id="meta">Loading preview state...</div>
            </div>
            <div class="badge" id="badge">Loading</div>
        </header>

        <section class="notice" id="notice"></section>
        <section class="terminal" id="terminal">
            <div class="line state">Connecting to preview logs...</div>
        </section>
    </main>

    <script>
        const hostname = window.location.hostname;
        const match = hostname.match(/^pr-(\d+)-([a-z0-9-]+)\./);
        const terminal = document.getElementById('terminal');
        const badge = document.getElementById('badge');
        const notice = document.getElementById('notice');
        const title = document.getElementById('title');
        const meta = document.getElementById('meta');

        function addLine(text, className = '') {
            const div = document.createElement('div');
            div.className = `line ${className}`.trim();
            div.textContent = text;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function setStatus(state) {
            const status = state.status || 'unknown';
            badge.textContent = status;
            badge.className = `badge ${status}`;
            title.textContent = `PR #${state.pr_number || '?'} ${state.workspace || 'preview'}`;

            const sha = state.resolved_sha || state.requested_sha || '';
            const shortSha = sha ? sha.slice(0, 12) : 'pending';
            meta.textContent = `${state.branch || 'unknown branch'} | ${shortSha} | ${state.message || 'Waiting for deployment state'}`;

            if (status === 'ready') {
                notice.textContent = 'Deployment is ready. Opening the preview application...';
                notice.className = 'notice ready show';
                setTimeout(() => window.location.reload(), 2500);
            } else if (status === 'failed') {
                notice.textContent = state.message || 'Deployment failed. The logs below should show the failing step.';
                notice.className = 'notice failed show';
            } else {
                notice.className = 'notice';
            }
        }

        if (!match) {
            badge.textContent = 'Invalid';
            meta.textContent = 'This hostname does not match a PR preview URL.';
        } else {
            const prNumber = match[1];
            const workspace = match[2];
            const instanceId = `pr-${prNumber}-${workspace}`;
            const statusUrl = `/status/${instanceId}`;
            const logsUrl = `/logs/${instanceId}`;

            terminal.innerHTML = '';

            fetch(statusUrl, { cache: 'no-store' })
                .then((response) => response.json())
                .then(setStatus)
                .catch(() => addLine('Could not read preview status yet. Waiting for logs...', 'error'));

            const eventSource = new EventSource(logsUrl);
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.state) {
                    setStatus(data.state);
                    if (data.state.message) {
                        addLine(`[state] ${data.state.status}: ${data.state.message}`, 'state');
                    }
                }
                if (data.line) {
                    const text = `[${data.source || 'log'}] ${data.line}`;
                    const lower = text.toLowerCase();
                    const style = lower.includes('error') || lower.includes('failed') ? 'error' : (data.source || 'deploy');
                    addLine(text, style);
                }
                if (data.failed || data.complete) {
                    eventSource.close();
                }
            };

            eventSource.onerror = () => {
                addLine('Log stream disconnected. Refresh the page to reconnect.', 'error');
                eventSource.close();
            };
        }
    </script>
</body>
</html>
